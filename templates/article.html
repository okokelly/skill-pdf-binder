<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 11pt; line-height: 1.7; color: #1a1a1a;
    max-width: 720px; margin: 0 auto; padding: 1.5cm 1.5cm 2.5cm 1.5cm;
  }
  h2 {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 20pt; color: #111; margin-bottom: 6pt;
  }
  .meta { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 9pt; color: #777; }
  .meta a { color: #555; }
  hr { border: none; border-top: 1px solid #ddd; margin: 14pt 0; }
  h3, h4 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #222; }
  h3 { font-size: 14pt; margin: 14pt 0 6pt; }
  h4 { font-size: 12pt; margin: 12pt 0 5pt; }
  p { margin: 8pt 0; }
  img { max-width: 100%; height: auto; margin: 8pt 0; }
  pre { background: #f5f5f5; padding: 10pt; font-size: 9pt; border-radius: 4pt; overflow-x: auto; }
  code { font-family: monospace; font-size: 9pt; }
  blockquote { border-left: 3px solid #ccc; padding-left: 12pt; margin: 10pt 0; color: #555; }
  table { border-collapse: collapse; width: 100%; margin: 10pt 0; }
  td, th { border: 1px solid #ddd; padding: 6pt 8pt; text-align: left; }
  @page { margin: 2cm 1.8cm 2.5cm 1.8cm; }
</style></head>
<body>
  <h2>ARTICLE_TITLE</h2>
  <p class="meta"><strong>AUTHOR</strong></p>
  <p class="meta"><a href="ARTICLE_URL">ARTICLE_URL</a></p>
  <hr>
  <!-- CLEAN_HTML from readability goes here -->
</body>
</html>
